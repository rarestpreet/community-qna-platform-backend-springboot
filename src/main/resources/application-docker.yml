spring:
  datasource:
    url: jdbc:mysql://mysql:3306/hearmeout?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&autoReconnect=true
    username: root
    password: ${DB_PASS}
    hikari:
      initialization-fail-timeout: 6000


  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect