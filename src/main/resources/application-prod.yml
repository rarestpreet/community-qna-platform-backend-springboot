spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      connection-timeout: 5000
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    open-in-view: false
